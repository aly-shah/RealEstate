name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH redeploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger redeploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,APP_NAME,BRANCH
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.APP_DIR || '/var/www/RealEstate' }}"
            export APP_NAME="${{ secrets.APP_NAME || 'promptzer-crm' }}"
            export BRANCH="${{ secrets.BRANCH || 'main' }}"
            export PATH="$PATH:/usr/local/bin:/root/.npm-global/bin"

            cd "$APP_DIR"

            echo "▸ Fetching origin/$BRANCH"
            git fetch --depth 1 origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Run the in-repo script if it exists; otherwise inline equivalent.
            if [ -x deploy/redeploy.sh ]; then
              bash deploy/redeploy.sh
            else
              echo "▸ Installing"; npm ci
              echo "▸ Prisma";    npx prisma generate && npx prisma db push --skip-generate
              echo "▸ Build";     npm run build
              echo "▸ Reload";    pm2 reload "$APP_NAME" --update-env || pm2 start ecosystem.config.cjs --update-env
              pm2 save
            fi
            echo "▸ Done $(date -Is)"
