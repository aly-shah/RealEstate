name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # lets you trigger it from the Actions tab

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH redeploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger redeploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.APP_DIR || '/var/www/RealEstate' }}
            bash deploy/redeploy.sh
