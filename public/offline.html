<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Proptimizr</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100dvh; display: grid; place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f6f7fb; color: #0f172a; padding: 24px;
      }
      .card {
        max-width: 360px; text-align: center; background: #fff; border: 1px solid #e6e8ef;
        border-radius: 20px; padding: 32px 28px; box-shadow: 0 10px 30px -12px rgba(15,23,42,.18);
      }
      .mark {
        width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 16px; display: grid;
        place-items: center; color: #fff; font-weight: 800; font-size: 28px;
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 45%, #4338ca 100%);
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: #475569; margin: 0 0 20px; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
        color: #fff; background: #4f46e5; padding: 10px 20px; border-radius: 12px;
      }
      button:active { background: #4338ca; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">P</div>
      <h1>You're offline</h1>
      <p>Proptimizr needs a connection to load your latest leads, visits and messages. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
